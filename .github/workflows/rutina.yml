name: Rutina Diaria Google Sheets

on:
  schedule:
    - cron: '20 12,1,8,10,20 * * *' 
  workflow_dispatch: 

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias exactas
        # Aquí están TODAS las herramientas que tu código necesita para no fallar
        run: pip install nbconvert ipykernel gspread requests beautifulsoup4 pandas gspread-dataframe oauth2client StringIO

      - name: ▶️ Ejecutar archivo .ipynb
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }} 
        # RECUERDA: Cambia "TU_ARCHIVO.ipynb" por el nombre de tu cuaderno
        run: jupyter nbconvert --execute --to notebook --inplace "data_F1Project.ipynb"
