name: Rutina Diaria Google Sheets

on:
  schedule:
    - cron: '0 8,14,20,1 * * *' # Ejemplo: 3 veces al día
  workflow_dispatch:

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias para Colab y código
        # Aquí instalamos nbconvert para que lea tu .ipynb, gspread para Google, y debes añadir las tuyas
        run: |
          pip install nbconvert ipykernel gspread
          # REEMPLAZA ESTA LÍNEA SI USAS MÁS LIBRERÍAS (ej: pip install pandas requests)

      - name: ▶️ Ejecutar archivo .ipynb
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }} 
        # Esta orden lee tu Colab, lo ejecuta celda por celda en el servidor y termina
        run: jupyter nbconvert --execute --to notebook --inplace "data_F1Project.ipynb"
